name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy==1.26.4
          pip install -r requirements.txt

      - name: Lint Python syntax
        run: |
          python -m py_compile app.py
          python -m py_compile training_handler.py
          python -m py_compile mysql_handler.py

      - name: Import test
        run: |
          python -c "import cv2, numpy, pandas, streamlit; print('Dependencies OK')"
